<!DOCTYPE html>                                       <!-- 声明HTML5文档类型 -->
<html>                                                <!-- HTML根标签 -->
<body>                                                <!-- 页面主体 -->

  <div style="border-style:dotted">                   <!-- div：块级分组，加点状边框 -->
    <p> Borders are cool... </p>                      <!-- 段落1，在div框内 -->
    <p> ... especially dotted ones </p>               <!-- 段落2，在div框内 -->
  </div>                                              <!-- div结束 -->

  <p>                                                 <!-- 新段落 -->
    But not as cool as                                <!-- 普通文本 -->
    <span style="background-color:tomato">            <!-- span：行内分组，加番茄红背景色 -->
      over-saturated highlighted                      <!-- 被高亮的文字 -->
    </span>                                           <!-- span结束 -->
    text.                                             <!-- 继续普通文本，与span在同一行 -->
  </p>                                                <!-- 段落结束 -->

</body>                                               <!-- 主体结束 -->
</html>                                               <!-- HTML结束 -->
