<!DOCTYPE html>                                                          <!-- 声明 HTML5 文档 -->
<html lang="zh">                                                         <!-- 根元素,语言设为中文 -->
<head>                                                                    <!-- 文档头部 -->
    <meta charset="UTF-8">                                                <!-- 字符编码 UTF-8 -->
    <meta name="viewport" content="width=device-width, initial-scale=1">  <!-- 移动端适配 -->
    <title>P27 AJAX with Public API 公共API演示</title>                   <!-- 浏览器标签标题 -->
    <link rel="stylesheet" href="style.css">                              <!-- 引入外部 CSS -->
    <!-- 引入 jQuery CDN,$.get/$.ajax 由它提供 -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>                                                                   <!-- 头部结束 -->

<body>                                                                    <!-- 页面主体 -->

    <div class="container">                                               <!-- 容器 -->

        <h1>🐕 Random Dog via Public API</h1>                              <!-- 主标题 -->
        <p class="subtitle">CITS5505 Individual Project — AJAX Demo</p>   <!-- 副标题 -->

        <!-- API 信息展示区 -->
        <div class="api-info">                                            <!-- API信息框 -->
            <strong>API:</strong>                                         <!-- API 名称标签 -->
            <code>https://dog.ceo/api/breeds/image/random</code>          <!-- 公共 API 地址 -->
            <br>
            <strong>No API key required ✅</strong>                        <!-- 无需 API key -->
        </div>

        <!-- 触发 AJAX 请求的按钮 -->
        <button id="fetchBtn">🔄 Fetch Random Dog 获取随机狗狗</button>    <!-- 发起请求按钮 -->

        <!-- 状态显示区(加载中/成功/失败) -->
        <div id="status">Click the button to fetch a random dog image.</div>  <!-- 初始提示 -->

        <!-- 图片显示区(初始空,AJAX 成功后填充) -->
        <div id="imageBox">                                               <!-- 图片容器 -->
            <img id="dogImage" src="" alt="">                             <!-- 图片标签,src 稍后由 JS 填 -->
        </div>

        <!-- 原始 JSON 响应展示区(教学用,让学生看到服务器返回的真实数据) -->
        <div class="raw-panel">                                           <!-- 原始响应面板 -->
            <h3>📦 Raw JSON Response 原始 JSON 响应</h3>                    <!-- 小标题 -->
            <pre id="rawJson">(empty)</pre>                               <!-- 显示原始 JSON 的区域 -->
        </div>

    </div>                                                                <!-- 容器结束 -->

    <!-- 最后引入 app.js(必须在 jQuery 之后) -->
    <script src="app.js"></script>                                        <!-- 主逻辑脚本 -->

</body>                                                                   <!-- 主体结束 -->
</html>                                                                   <!-- HTML 结束 -->
