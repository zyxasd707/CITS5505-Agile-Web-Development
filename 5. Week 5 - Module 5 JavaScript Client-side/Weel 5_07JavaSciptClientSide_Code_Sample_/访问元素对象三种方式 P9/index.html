<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DOM访问示例</title>
</head>
<body>

  <!-- 三张图片 -->
  <img src="cat.jpg"  alt="猫">
  <img src="dog.jpg"  alt="狗">
  <img src="bird.jpg" alt="鸟">

  <!-- 一个文章区块，内含多个段落 -->
  <div id="article">
    <p>第一段：猫很懒。</p>
    <p>第二段：狗很忠诚。</p>
    <p>第三段：鸟会飞。</p>
  </div>

  <!-- 新增：带 id 的独立元素 -->
  <h1 id="pageTitle">宠物百科</h1>
  <p  id="intro">欢迎来到宠物世界。</p>
  <button id="submitBtn">提交</button>

  <script src="demo.js"></script>

</body>
</html>
